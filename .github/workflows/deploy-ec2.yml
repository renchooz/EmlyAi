name: Deploy to EC2

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE_TAG="${{ inputs.image_tag }}"
            echo "Deploying commit: ${IMAGE_TAG}"

            echo "Updating packages..."
            sudo apt update -y

            echo "Installing Docker if missing..."
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt install docker.io -y
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            echo "Installing Docker Compose plugin if missing..."
            if ! docker compose version >/dev/null 2>&1; then
              sudo apt install docker-compose-v2 -y || sudo apt install docker-compose-plugin -y
            fi

            echo "Installing Nginx if missing..."
            if ! command -v nginx >/dev/null 2>&1; then
              sudo apt install nginx -y
              sudo systemctl enable nginx
            fi

            echo "Creating app directory..."
            mkdir -p ~/ai-resume-app/uploads
            cd ~/ai-resume-app

            SERVER_IMAGE="${{ secrets.DOCKER_USERNAME }}/ai-resume-server:${IMAGE_TAG}"
            CLIENT_IMAGE="${{ secrets.DOCKER_USERNAME }}/ai-resume-client:${IMAGE_TAG}"

            echo "Creating .env file..."
            {
              echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}"
              echo "PORT=${{ secrets.PORT }}"
              echo "SERVER_URL=${{ secrets.SERVER_URL }}"
              echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}"
              echo "MONGO_URI=${{ secrets.MONGO_URI }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
              echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
              echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
              echo "CLIENT_URL=${{ secrets.CLIENT_URL }}"
            } > .env

            echo "Creating Prometheus.yml"
            {
              echo "global:"
              echo "  scrape_interval: 15s"
              echo ""
              echo "scrape_configs:"
              echo '  - job_name: "emlyai-server"'
              echo "    metrics_path: /metrics"
              echo "    static_configs:"
              echo '      - targets: ["server:5000"]'
            } > prometheus.yml

            echo "Creating docker-compose.yml..."
            {
              echo "services:"
              echo "  server:"
              echo "    image: ${SERVER_IMAGE}"
              echo "    container_name: ai-resume-server"
              echo "    env_file:"
              echo "      - .env"
              echo "    volumes:"
              echo "      - ./uploads:/app/uploads"
              echo "    ports:"
              echo '      - "127.0.0.1:5000:5000"'
              echo "    restart: unless-stopped"
              echo ""
              echo "  client:"
              echo "    image: ${CLIENT_IMAGE}"
              echo "    container_name: ai-resume-client"
              echo "    ports:"
              echo '      - "127.0.0.1:5173:80"'
              echo "    depends_on:"
              echo "      - server"
              echo "    restart: unless-stopped"
              echo ""
              echo "  mongo:"
              echo "    image: mongo:7"
              echo "    container_name: ai-resume-mongo"
              echo "    volumes:"
              echo "      - mongo_data:/data/db"
              echo "    restart: unless-stopped"
              echo ""
              echo "  prometheus:"
              echo "    image: prom/prometheus:latest"
              echo "    container_name: emlyai-prometheus"
              echo "    volumes:"
              echo "      - ./prometheus.yml:/etc/prometheus/prometheus.yml"
              echo "    ports:"
              echo '      - "127.0.0.1:9090:9090"'
              echo "    restart: unless-stopped"
              echo ""
              echo "  grafana:"
              echo "    image: grafana/grafana:latest"
              echo "    container_name: emlyai-grafana"
              echo "    ports:"
              echo '      - "127.0.0.1:3000:3000"'
              echo "    environment:"
              echo "      - GF_SERVER_ROOT_URL=https://98.83.136.165.nip.io/grafana/"
              echo "      - GF_SERVER_SERVE_FROM_SUB_PATH=true"
              echo "    volumes:"
              echo "      - grafana_data:/var/lib/grafana"
              echo "    restart: unless-stopped"
              echo ""
              echo "volumes:"
              echo "  mongo_data:"
              echo "  grafana_data:"
            } > docker-compose.yml

            echo "docker-compose.yml image lines:"
            grep "image:" docker-compose.yml

            echo "Setting up Nginx reverse proxy..."
            sudo tee /etc/nginx/sites-available/ai-resume > /dev/null <<'EOF'
            server {
                listen 80;
                server_name 98.83.136.165.nip.io;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name 98.83.136.165.nip.io;
                ssl_certificate /etc/letsencrypt/live/98.83.136.165.nip.io/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/98.83.136.165.nip.io/privkey.pem;

                location / {
                    proxy_pass http://127.0.0.1:5173;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
                
                location /uploads/ {
                    proxy_pass http://127.0.0.1:5000/uploads/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                } 

                location /api/ {
                    proxy_pass http://127.0.0.1:5000/api/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /grafana/ {
                    proxy_pass http://127.0.0.1:3000/grafana/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                }          }
            EOF

            sudo ln -sf /etc/nginx/sites-available/ai-resume /etc/nginx/sites-enabled/ai-resume
            sudo rm -f /etc/nginx/sites-enabled/default



            echo "Saving current running images for rollback..."

            OLD_SERVER_IMAGE=$(docker inspect --format='{{.Config.Image}}' ai-resume-server 2>/dev/null || true)
            OLD_CLIENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' ai-resume-client 2>/dev/null || true)

            echo "Deploying new containers..."
            docker pull "${SERVER_IMAGE}"
            docker pull "${CLIENT_IMAGE}"
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --pull always --force-recreate --remove-orphans

            echo "Restarting Nginx..."
            sudo nginx -t
            sudo systemctl restart nginx

            echo "Waiting for server to start..."
            HEALTH_OK=false
            for attempt in $(seq 1 12); do
              if curl -fsS http://127.0.0.1:5000/api/health; then
                HEALTH_OK=true
                break
              fi
              echo "Health check attempt ${attempt}/12 failed, retrying in 5s..."
              sleep 5
            done

            RUNNING_SERVER_IMAGE=$(docker inspect --format='{{.Config.Image}}' ai-resume-server 2>/dev/null || true)
            RUNNING_CLIENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' ai-resume-client 2>/dev/null || true)
            echo "Running server image: ${RUNNING_SERVER_IMAGE}"
            echo "Running client image: ${RUNNING_CLIENT_IMAGE}"

            if [[ "${RUNNING_SERVER_IMAGE}" != *"${IMAGE_TAG}"* ]] || [[ "${RUNNING_CLIENT_IMAGE}" != *"${IMAGE_TAG}"* ]]; then
              echo "Deployed containers are not running the expected commit tag: ${IMAGE_TAG}"
              exit 1
            fi

            echo "Running health check..."
            if [ "$HEALTH_OK" = true ]; then
              echo "Health check passed ✅"
              echo "Cleaning old Docker images..."
              docker image prune -f
              echo "Deployment completed successfully!"
            else
              echo "Health check failed ❌ Rolling back..."

              if [ -n "$OLD_SERVER_IMAGE" ]; then
                sed -i "s|image: .*ai-resume-server:.*|image: $OLD_SERVER_IMAGE|" docker-compose.yml
              fi

              if [ -n "$OLD_CLIENT_IMAGE" ]; then
                sed -i "s|image: .*ai-resume-client:.*|image: $OLD_CLIENT_IMAGE|" docker-compose.yml
              fi

              docker compose --env-file .env up -d --force-recreate

              echo "Waiting after rollback..."
              sleep 10

              if curl -fsS http://127.0.0.1:5000/api/health; then
                echo "Rollback successful 🔁"
              else
                echo "Rollback also failed. Check logs:"
                docker logs ai-resume-server --tail=100
                exit 1
              fi

              exit 1
            fi

