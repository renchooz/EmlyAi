name: Build and Push Docker Images

on:
  workflow_call:

jobs:
  docker:
    runs-on: ubuntu-latest      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Server
        uses: docker/build-push-action@v7
        with:
          context: ./server
          load: true
          tags: |
           ${{ secrets.DOCKER_USERNAME }}/ai-resume-server:latest
           ${{ secrets.DOCKER_USERNAME }}/ai-resume-server:${{ github.sha }}

      - name: Scan Server Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/ai-resume-server:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1    

      - name: Build and Push Server
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: |
           ${{ secrets.DOCKER_USERNAME }}/ai-resume-server:latest
           ${{ secrets.DOCKER_USERNAME }}/ai-resume-server:${{ github.sha }}     

      - name: Build and Push Client
        uses: docker/build-push-action@v7
        with:
          context: ./client
          load: true
          tags: |
           ${{ secrets.DOCKER_USERNAME }}/ai-resume-client:latest
           ${{ secrets.DOCKER_USERNAME }}/ai-resume-client:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }} 
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}   

      - name: Scan Client Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/ai-resume-client:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1        

      - name: Build and Push Client
        uses: docker/build-push-action@v7
        with:
          context: ./client
          push: true
          tags: |
           ${{ secrets.DOCKER_USERNAME }}/ai-resume-client:latest
           ${{ secrets.DOCKER_USERNAME }}/ai-resume-client:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }} 
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}     
    